name: Build KernelSU

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y gcc-arm-linux-gnueabihf flex bison bc libssl-dev libelf-dev
    
    - name: Build kernel
      run: |
        export ARCH=arm
        export CROSS_COMPILE=arm-linux-gnueabihf-
        
        make a02_defconfig
        
        # --- KernelSU Core Requirements ---
        echo "CONFIG_KSU=y" >> .config
        echo "CONFIG_KPROBES=y" >> .config
        echo "CONFIG_KPROBE_EVENTS=y" >> .config
        echo "CONFIG_OVERLAY_FS=y" >> .config
        echo "CONFIG_MODULES=y" >> .config
        
        # --- Disable Problematic Features ---
        echo "CONFIG_INITRAMFS_SOURCE=\"\"" >> .config
        echo "CONFIG_BLK_DEV_INITRD=n" >> .config
        echo "CONFIG_VFP=n" >> .config
        
        # --- Disable Certificate Handling ---
        echo "CONFIG_SYSTEM_TRUSTED_KEYS=\"\"" >> .config
        echo "CONFIG_SYSTEM_TRUSTED_KEYRING=n" >> .config
        echo "CONFIG_SECONDARY_TRUSTED_KEYRING=n" >> .config
        
        # --- ARMv7 Baseline Configuration (Fixes Multiple Errors at Once) ---
        echo "CONFIG_AEABI=y" >> .config
        echo "CONFIG_OABI_COMPAT=n" >> .config
        echo "CONFIG_VDSO=y" >> .config
        echo "CONFIG_ARM_THUMB=y" >> .config
        echo "CONFIG_ARM_THUMBEE=y" >> .config
        echo "CONFIG_ARM_ARCH_TIMER=y" >> .config
        echo "CONFIG_ARM_GIC=y" >> .config
        echo "CONFIG_SWP_EMULATE=y" >> .config
        echo "CONFIG_CPU_SW_DOMAIN_PAN=y" >> .config
        echo "CONFIG_HIGHMEM=y" >> .config
        echo "CONFIG_VMSPLIT_3G=y" >> .config
        
        # --- Additional Common Options ---
        echo "CONFIG_SUSPEND=y" >> .config
        echo "CONFIG_PM=y" >> .config
        echo "CONFIG_CPU_IDLE=y" >> .config
        echo "CONFIG_ARM_CPUIDLE=y" >> .config
        
        # Sync config and build
        make olddefconfig 2>/dev/null || yes "" | make oldconfig
        make -j4 LOCALVERSION="-KernelSU"
    
    - name: Upload kernel
      uses: actions/upload-artifact@v4
      with:
        name: kernel
        path: arch/arm/boot/zImage
